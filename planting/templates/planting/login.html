<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NuHarvest — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f2318;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Subtle grid background */
    body::before {
      content: '';
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .login-box {
      background: #fff;
      border-radius: 16px;
      padding: 40px 44px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
      position: relative;
      z-index: 1;
    }
    .brand {
      display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
    }
    .brand-icon {
      width: 44px; height: 44px; border-radius: 10px;
      background: #1B4332;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .brand-name { font-size: 20px; font-weight: 700; color: #1B4332; }
    .brand-sub  { font-size: 12px; color: #6b7f73; margin-top: 1px; }
    h2 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 6px; }
    p  { font-size: 13px; color: #6b7f73; margin-bottom: 28px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input[type=text], input[type=password] {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-family: inherit; font-size: 14px; color: #111;
      transition: border-color 0.15s; margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #1B4332; }
    .btn-login {
      width: 100%; padding: 12px;
      background: #1B4332; color: #fff;
      border: none; border-radius: 8px;
      font-family: inherit; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.15s; margin-top: 4px;
    }
    .btn-login:hover { background: #2D6A4F; }
    .error-msg {
      background: #FEE2E2; border: 1px solid #FECACA; color: #991B1B;
      padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 18px;
    }
    .demo-creds {
      margin-top: 20px; padding: 14px;
      background: #F0F7F2; border-radius: 8px; font-size: 12px; color: #374151;
    }
    .demo-creds strong { display: block; margin-bottom: 6px; color: #1B4332; }
    .cred-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .cred-badge {
      display: inline-block; padding: 1px 8px; border-radius: 10px;
      font-size: 10px; font-weight: 700; margin-left: 6px;
    }
    .cred-admin   { background: #DBEAFE; color: #1E40AF; }
    .cred-manager { background: #DCFCE7; color: #166534; }
    .cred-viewer  { background: #FEF9C3; color: #854D0E; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="brand">
      <div class="brand-icon">🌱</div>
      <div>
        <div class="brand-name">NuHarvest</div>
        <div class="brand-sub">Planting Operations — POC Dashboard</div>
      </div>
    </div>

    <h2>Sign in</h2>
    <p>Enter your credentials to access the dashboard.</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <label>Username</label>
      <input type="text" name="username" placeholder="your username" autofocus>
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••">
      <button type="submit" class="btn-login">Sign In →</button>
    </form>
